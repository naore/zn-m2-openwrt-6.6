name: zn-m2 build

on: 
  workflow_run:
    workflows: ["Auto-Clean"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      runner_choice:
        type: choice
        options: [self-hosted, ubuntu-24.04]
        default: ubuntu-24.04
        
permissions:
  contents: write
  actions: write

env:
  DEVICE_NAME: zn-m2
  REPO_URL: https://github.com/LiBwrt/openwrt-6.x
  REPO_BRANCH: main-nss
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: ./config/zn-m2.config
  DIY_P1_SH: ./scripts/zn-m2/diy-part1.sh
  DIY_P2_SH: ./scripts/zn-m2/diy-part2.sh
  DIY_P3_SH: ./scripts/zn-m2/diy-part3.sh
  UPLOAD_BIN_DIR: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  TERM: dumb
  DEBIAN_FRONTEND: noninteractive
  
jobs:
  build:
    runs-on: ${{ inputs.runner_choice == 'self-hosted'
                 && 'self-hosted'
                 || inputs.runner_choice }}

    steps:
    
    - name: Clean up previous failed workflow runs
      uses: mattraks/delete-workflow-runs@v2
      with: 
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 0 
          keep_minimum_runs: 0      
          delete_run_by_conclusion_pattern: "failure,cancelled,skipped,timed_out,success"
    
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      if: ${{ inputs.runner_choice != 'self-hosted' }}
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        curl -s https://raw.githubusercontent.com/immortalwrt/build-scripts/master/init_build_environment.sh | sudo bash
        DEBIAN_FRONTEND=noninteractive
        sudo apt-get install -y rename pigz libfuse-dev upx subversion clang
        sudo apt-get autoremove -y --purge
        sudo apt-get clean -y
        sudo timedatectl set-timezone "$TZ"
        git config --global user.email ${{ github.actor }}@users.noreply.github.com
        git config --global user.name ${{ github.actor }}
        git config --global init.defaultBranch master

    - name: Clone source code
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        
    - name: Check Caches
      id: check-cache
      uses: actions/cache@v4
      with:
        key: ${{env.CONFIG_FILE}}-${{env.REPO_URL}}-${{hashFiles('openwrt/.config')}}
        restore-keys: ${{env.CONFIG_FILE}}-${{env.REPO_URL}}
        path: |
          ./openwrt/.ccache
          ./openwrt/staging_dir/host*
          ./openwrt/staging_dir/tool*

    - name: Update Caches
      env:
        CACHE_HIT: ${{ steps.check-cache.outputs.cache-hit }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # 必須提供 Token 才能刪除快取
      run: |
        # 1. 處理時間戳，防止恢復快取後重新編譯
        if [ -d "./openwrt/staging_dir" ]; then
          find "./openwrt/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r DIR; do
            find "$DIR" -type f -exec touch {} +
          done
          mkdir -p ./openwrt/tmp && echo "1" > ./openwrt/tmp/.build
          echo "Toolchain/Host stamps touched, skip re-compile!"
        else
          echo "Caches missed!"
        fi

        # 2. 如果快取未命中，清理舊的快取以釋放空間
        if [ "$CACHE_HIT" != 'true' ]; then
          echo "Cleaning up old caches..."
          # 獲取符合 key 前綴的快取列表並刪除
          gh cache list --limit 100 --key "${{ env.CONFIG_FILE }}-${{ env.REPO_URL }}" | cut -f 1 | while read -r cache_key; do
            gh cache delete "$cache_key"
          done
          echo "Old caches cleanup done!"
        fi
          
    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update & Install feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        # 在執行 DIY 腳本前，先清理可能導致衝突的舊配置
        rm -f .config* 

    - name: Load custom configuration
      run: |
        set -x
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P3_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P3_SH
        make defconfig
        ./scripts/diffconfig.sh > diffconfig # 检查差异
        # cat diffconfig 
        
    - name: Download package
      id: package
      run: |
        cd openwrt
        make download -j4
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;
        find . -maxdepth 3 -mindepth 1 -type d

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 V=s
        df -h
        [ $? -eq 0 ] && echo "status=success" >> $GITHUB_OUTPUT # 确保 make 成功才设置
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Prepare and Organize Files
      id: organize
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'
      run: |
        set -x  # 开启调试模式，显示每一行执行过程
        echo "Check current directory: $(pwd)"
        ls -R openwrt/bin/targets/ || echo "Targets directory not found!"
        
        cd openwrt/
        mkdir ./upload/
        
        # 1. 备份配置
        cp -f .config ./upload/Config-${{ env.FILE_DATE }}.txt

        # 2. 提取信息
        echo "WRT_KVER=$(find ./bin/targets/ -type f -name "*.manifest" -exec grep -oP '^kernel - \K[\d\.]+' {} \; | head -n 1)" >> $GITHUB_ENV
        # 限制插件列表长度，防止 Release Body 过长导致失败
        echo "WRT_LIST=$(find ./bin/targets/ -type f -name "*.manifest" -exec grep -oP '^luci-(app|theme)[^ ]*' {} \; | head -n 20 | tr '\n' ' ')" >> $GITHUB_ENV

        find ./bin/targets/ -maxdepth 3 -mindepth 1 -type f
        
        # 3. 移动固件（重点：只抓取常见的固件格式）
        # 加上 -L 是为了防止软链接失效
        find ./bin/targets/ -type f \( -name "*.bin" -o -name "*.img*" -o -name "*.gz" -o -name "*.mbi" -o -name "*.ubi" \) | while read -r FILE; do
          mv -f "$FILE" ./upload/
        done
        
        # 检查是否真的有文件被移入
        if [ "$(ls -A ./upload/)" ]; then
          echo "status=success" >> $GITHUB_OUTPUT
        else
          echo "No firmware files found!"
          exit 1
        fi

    - name: Publish to Release
      uses: softprops/action-gh-release@v2
      if: steps.organize.outputs.status == 'success' && !cancelled() && env.UPLOAD_RELEASE == 'true'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: OpenWrt-${{ env.DEVICE_NAME }}-${{ env.FILE_DATE }}
        body: |
          ## 固件發佈信息
          設備名稱：${{ env.DEVICE_NAME }}
          編譯時間：${{ env.FILE_DATE }}
          
          源码：${{env.REPO_URL}}
          分支：${{env.REPO_BRANCH}}

          配置：${{env.CONFIG}}

          内核版本：${{env.WRT_KVER}}
          插件列表：${{env.WRT_LIST}}
        files: openwrt/upload/*
